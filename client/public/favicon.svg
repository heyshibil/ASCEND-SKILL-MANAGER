<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Ascend favicon — actual logo mark on brand dark background
    Dark bg: #0C0C0B  |  Brand blue: #2563EB
    Logo is padded ~12% from edges for visual breathing room
  -->

  <!-- Dark rounded-square background -->
  <rect width="100" height="100" rx="16" fill="#0C0C0B"/>

  <!-- Ascend A-mark in brand blue, scaled to 76% with 12px padding -->
  <g
    fill="none"
    stroke="#2563EB"
    stroke-width="7.5"
    stroke-linecap="butt"
    stroke-linejoin="miter"
    transform="translate(12, 12) scale(0.76)"
  >
    <!-- A-frame: left foot → apex → right foot -->
    <path d="M 8 92 L 50 8 L 92 92"/>

    <!-- Arc crossbar: inner edges, curves downward -->
    <path d="M 33 54 A 20 14 0 0 0 67 54"/>
  </g>
</svg>
