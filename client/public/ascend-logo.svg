<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Ascend logo — hand-traced SVG
    Structure:
      1. A-frame: two diagonal strokes from feet to apex (M left-foot → apex → right-foot)
      2. Arc crossbar: concave-down arc connecting the inner edges of both legs
  -->
  <g
    fill="none"
    stroke="#000000"
    stroke-width="10"
    stroke-linecap="butt"
    stroke-linejoin="miter"
  >
    <!-- A-frame: left foot → apex → right foot -->
    <path d="M 8 92 L 50 8 L 92 92"/>

    <!-- Arc crossbar: inner edges, curves downward (sweep=0 = counterclockwise = bows down) -->
    <path d="M 33 54 A 20 14 0 0 0 67 54"/>
  </g>
</svg>
